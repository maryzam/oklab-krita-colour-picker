name: Dev checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dev-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python3 -m pip install -r requirements-dev.txt
      - run: python3 scripts/checks/dev_checks.py --scope tracked --pytest
